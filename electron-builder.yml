appId: com.spinesurge.pro
productName: SpineSurge Pro
copyright: "Copyright © 2026 SpineSurge"

directories:
  output: dist_electron
  buildResources: build

files:
  - out/**/*
  - package.json
  - resources/**/*

# macOS Configuration
mac:
  category: public.app-category.medical
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize:
    teamId: "${APPLE_TEAM_ID}"

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
  window:
    width: 540
    height: 380

# Windows Configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: "SpineSurge"
  verifyUpdateCodeSignature: false

# NSIS Configuration
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  shortcutName: SpineSurge Pro
  createDesktopShortcut: always
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerSidebar: build/installer_splash.png
  # Branding
  artifactName: "${productName}_Setup_${version}.${ext}"
  deleteAppDataOnUninstall: false

# After pack/build hooks can be added here if needed
# asar: true
# compression: maximum
