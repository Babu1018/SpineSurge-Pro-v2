services:
  # Backend Web Service
  - type: web
    name: spinesurge-backend
    runtime: node
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    rootDir: server
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    # disk: # Uncomment if using a paid plan for persistence
    #   name: spinesurge-data
    #   mountPath: /opt/render/project/src/server/uploads
    #   sizeGB: 1

  # Frontend Static Site
  - type: static
    name: spinesurge-frontend
    runtime: static
    buildCommand: npm install && npx vite build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: spinesurge-backend
          type: web
          property: hostWithScheme
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
