services:
  # Backend Web Service
  - type: web
    name: spinesurge-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    rootDir: server
    envVars:
      - key: NODE_ENV
        value: production
    # disk: # Uncomment if using a paid plan for persistence
    #   name: spinesurge-data
    #   mountPath: /opt/render/project/src/server/uploads
    #   sizeGB: 1

  # Frontend Static Site
  - type: static
    name: spinesurge-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    publishDir: out/renderer
    envVars:
      - key: VITE_API_URL
        fromService:
          name: spinesurge-backend
          type: web
          property: host
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
